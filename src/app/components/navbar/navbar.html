<header
  class="sticky top-0 z-50 border-b border-pink-100 bg-white shadow-sm"
>
  <nav
    class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4"
  >
    <a
      routerLink="/"
      class="text-2xl font-bold text-pink-700"
    >
      GlowSkin
    </a>

    <div class="flex items-center gap-5">
      <a
        routerLink="/"
        routerLinkActive="text-pink-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="font-medium text-gray-700 hover:text-pink-700"
      >
        Inicio
      </a>

      <a
        routerLink="/productos"
        routerLinkActive="text-pink-700"
        class="font-medium text-gray-700 hover:text-pink-700"
      >
        Productos
      </a>

      @if (authService.estaAutenticado()) {
        <a
          routerLink="/carrito"
          routerLinkActive="text-pink-700"
          class="font-medium text-gray-700 hover:text-pink-700"
        >
          Carrito
        </a>

        <a
          routerLink="/mis-pedidos"
          routerLinkActive="text-pink-700"
          class="font-medium text-gray-700 hover:text-pink-700"
        >
          Mis pedidos
        </a>
      }

      @if (authService.esAdministrador()) {
        <a
          routerLink="/admin"
          routerLinkActive="text-pink-700"
          class="font-medium text-gray-700 hover:text-pink-700"
        >
          Administración
        </a>
      }

      @if (authService.estaAutenticado()) {
        <span class="text-sm text-gray-600">
          {{ authService.obtenerUsuario()?.nombreUsuario }}
        </span>

        <button
          type="button"
          (click)="cerrarSesion()"
          class="rounded-lg border border-pink-600 px-4 py-2 font-semibold text-pink-700 transition hover:bg-pink-50"
        >
          Cerrar sesión
        </button>
      } @else {
        <a
          routerLink="/login"
          class="rounded-lg bg-pink-600 px-4 py-2 font-semibold text-white transition hover:bg-pink-700"
        >
          Iniciar sesión
        </a>
      }
    </div>
  </nav>
</header>
