<header
  class="sticky top-0 z-50 border-b border-emerald-100/80 bg-white/90 shadow-sm backdrop-blur"
>
  <nav
    class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4"
  >
    <a
      routerLink="/"
      class="inline-flex items-center gap-3.5 no-underline"
    >
      <span
        class="inline-flex h-12 w-12 items-center justify-center rounded-2xl border border-emerald-200/95 bg-[linear-gradient(145deg,#f7fffb_0%,#ecfdf5_100%)] shadow-[0_10px_30px_rgba(16,185,129,0.12)]"
      >
        <img
          src="/assets/img/logo2.png"
          alt="DermaHous"
          class="h-8 w-8 object-contain"
        />
      </span>
      <span class="hidden text-2xl font-semibold tracking-[0.08em] text-emerald-800 sm:inline">
        DermaHous
      </span>
    </a>

    <div class="flex items-center gap-5">
      <a
        routerLink="/"
        routerLinkActive="text-emerald-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="font-medium text-slate-600 transition hover:text-emerald-700"
      >
        Inicio
      </a>

      <a
        routerLink="/productos"
        routerLinkActive="text-emerald-700"
        class="font-medium text-slate-600 transition hover:text-emerald-700"
      >
        Productos
      </a>

      @if (authService.estaAutenticado()) {
        <a
          routerLink="/carrito"
          routerLinkActive="text-emerald-700"
          class="font-medium text-slate-600 transition hover:text-emerald-700"
        >
          Carrito
        </a>

        <a
          routerLink="/mis-pedidos"
          routerLinkActive="text-emerald-700"
          class="font-medium text-slate-600 transition hover:text-emerald-700"
        >
          Mis pedidos
        </a>
      }

      @if (authService.esAdministrador()) {
        <a
          routerLink="/admin"
          routerLinkActive="text-emerald-700"
          class="font-medium text-slate-600 transition hover:text-emerald-700"
        >
          Administracion
        </a>
      }

      @if (authService.estaAutenticado()) {
        <span class="text-sm font-medium text-slate-500">
          {{ authService.obtenerUsuario()?.nombreUsuario }}
        </span>

        <button
          type="button"
          (click)="cerrarSesion()"
          class="rounded-lg border border-emerald-200 px-4 py-2 font-semibold text-emerald-800 transition hover:bg-emerald-50"
        >
          Cerrar sesion
        </button>
      } @else {
        <a
          routerLink="/login"
          class="rounded-lg bg-emerald-600 px-4 py-2 font-semibold text-white transition hover:bg-emerald-700"
        >
          Iniciar sesion
        </a>
      }
    </div>
  </nav>
</header>
